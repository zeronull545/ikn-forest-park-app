version: '3.8'

services:
  # Laravel App Service
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: ikn-forest-app
    container_name: ikn_forest_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - ikn-network
    depends_on:
      - db
      - redis

  # Nginx Service
  webserver:
    image: nginx:alpine
    container_name: ikn_forest_webserver
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ikn-network
    depends_on:
      - app

  # PostgreSQL Database Service with PostGIS
  db:
    image: postgis/postgis:15-3.3
    container_name: ikn_forest_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ikn_forest_park
      POSTGRES_USER: ikn_admin
      POSTGRES_PASSWORD: ikn_password_99
    volumes:
      - ikn_postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/2_seed_data.sql
    networks:
      - ikn-network

  # Redis Service
  redis:
    image: redis:alpine
    container_name: ikn_forest_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ikn_redis_data:/data
    networks:
      - ikn-network

networks:
  ikn-network:
    driver: bridge

volumes:
  ikn_postgres_data:
    driver: local
  ikn_redis_data:
    driver: local
