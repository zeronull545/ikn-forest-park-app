name: ikn_forest_parks
description: A complete mobile application for social sharing and directory of Forest Parks in Ibu Kota Nusantara (IKN), Indonesia.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  provider: ^6.0.5
  http: ^1.1.0
  shared_preferences: ^2.2.0
  image_picker: ^1.0.4
  google_maps_flutter: ^2.5.0
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
